name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore OnlineShopping.slnx

      - name: Build solution
        run: dotnet build OnlineShopping.slnx --no-restore --configuration Release

      - name: Run Application unit tests
        run: >
          dotnet test tests/Application.Tests/Application.Tests.csproj
          --no-restore
          --configuration Release
          --verbosity normal
          --logger "trx;LogFileName=application-tests.trx"

      - name: Run Infrastructure unit tests
        run: >
          dotnet test tests/Infrastructure.Tests/Infrastructure.Tests.csproj
          --no-restore
          --configuration Release
          --verbosity normal
          --logger "trx;LogFileName=infrastructure-tests.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/*.trx'
