services:

  # ── SQL Server ────────────────────────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong@Passw0rd"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      # Wait until sqlcmd can reach the instance before starting the app.
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd' -Q 'SELECT 1' -No"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Console Application ───────────────────────────────────────
  # Kept in the 'app' profile so that 'docker compose up' only starts
  # the database. Run the interactive console with:
  #   docker compose run --rm app
  app:
    profiles: [app]
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DOTNET_ENVIRONMENT: Production
      # Overrides the value in appsettings.json so the app
      # connects to the 'db' service instead of localhost.
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=OnlineShoppingDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;"
    # Forward stdin/tty so the console menus are fully interactive.
    stdin_open: true
    tty: true
    depends_on:
      db:
        condition: service_healthy

volumes:
  mssql_data:
